<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON格式化</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 20px;
        }

        .back-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 14px;
            resize: vertical;
        }

        .textarea:focus {
            outline: 2px solid #e94560;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            min-width: 100px;
        }

        .btn-format {
            background: #e94560;
            color: white;
        }

        .btn-compress {
            background: #28a745;
            color: white;
        }

        .btn-copy {
            background: #007bff;
            color: white;
        }

        .btn-clear {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .result {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 15px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 14px;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
        }

        .error {
            color: #e94560;
        }

        .success {
            color: #28a745;
        }

        .label {
            font-size: 14px;
            margin-bottom: 10px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="location.href='index.html'">← 返回</button>
            <h1>📄 JSON格式化</h1>
            <div></div>
        </div>

        <div class="label">输入JSON：</div>
        <textarea class="textarea" id="inputJson" placeholder='{"name": "test", "value": 123}'></textarea>

        <div class="buttons">
            <button class="btn btn-format" onclick="formatJson()">格式化</button>
            <button class="btn btn-compress" onclick="compressJson()">压缩</button>
            <button class="btn btn-copy" onclick="copyResult()">复制结果</button>
            <button class="btn btn-clear" onclick="clearAll()">清空</button>
        </div>

        <div class="label">输出结果：</div>
        <div class="result" id="outputResult"></div>
    </div>

    <script>
        function formatJson() {
            const input = document.getElementById('inputJson').value.trim();
            if (!input) {
                showError('请输入JSON内容');
                return;
            }

            try {
                const obj = JSON.parse(input);
                const formatted = JSON.stringify(obj, null, 4);
                showSuccess(formatted);
            } catch (e) {
                showError('JSON格式错误: ' + e.message);
            }
        }

        function compressJson() {
            const input = document.getElementById('inputJson').value.trim();
            if (!input) {
                showError('请输入JSON内容');
                return;
            }

            try {
                const obj = JSON.parse(input);
                const compressed = JSON.stringify(obj);
                showSuccess(compressed);
            } catch (e) {
                showError('JSON格式错误: ' + e.message);
            }
        }

        function copyResult() {
            const result = document.getElementById('outputResult').textContent;
            if (!result || result.includes('错误')) return;
            
            navigator.clipboard.writeText(result).then(() => {
                alert('已复制到剪贴板');
            });
        }

        function clearAll() {
            document.getElementById('inputJson').value = '';
            document.getElementById('outputResult').textContent = '';
            document.getElementById('outputResult').className = 'result';
        }

        function showError(msg) {
            const el = document.getElementById('outputResult');
            el.textContent = msg;
            el.className = 'result error';
        }

        function showSuccess(msg) {
            const el = document.getElementById('outputResult');
            el.textContent = msg;
            el.className = 'result success';
        }
    </script>
</body>
</html>
