<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天天游戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
    }
    .header {
      text-align: center;
      padding: 40px 20px;
      color: white;
    }
    .title {
      font-size: 32px;
      font-weight: bold;
      display: block;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 14px;
      opacity: 0.8;
    }
    .game-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .game-row {
      display: flex;
      gap: 15px;
      justify-content: center;
    }
    .game-card {
      flex: 1;
      background: white;
      border-radius: 16px;
      padding: 25px 15px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .game-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }
    .game-card.small {
      flex: 1;
      max-width: 150px;
    }
    .game-icon {
      font-size: 36px;
      margin-bottom: 10px;
    }
    .game-name {
      font-size: 14px;
      color: #333;
      font-weight: 500;
    }
    .game-desc {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }
    .game-placeholder {
      flex: 1;
      max-width: 150px;
      visibility: hidden;
    }
    .footer {
      text-align: center;
      padding: 40px 20px;
      color: rgba(255,255,255,0.6);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="title">天天游戏</span>
      <span class="subtitle">精选休闲游戏与应用</span>
    </div>
    
    <div class="game-list">
      <div class="game-row">
        <div class="game-card small" onclick="location.href='calc.html'">
          <div class="game-icon">🔢</div>
          <span class="game-name">天天计算</span>
          <span class="game-desc">口算练习</span>
        </div>
        <div class="game-card small" onclick="location.href='brain.html'">
          <div class="game-icon">🧠</div>
          <span class="game-name">天天急转弯</span>
          <span class="game-desc">脑筋急转弯</span>
        </div>
        <div class="game-card small" onclick="location.href='jokes.html'">
          <div class="game-icon">😂</div>
          <span class="game-name">天天冷笑话</span>
          <span class="game-desc">程序员冷笑话</span>
        </div>
      </div>
    </div>
    
    <div class="footer">
      更多内容敬请期待
    </div>
  </div>
</body>
</html>
